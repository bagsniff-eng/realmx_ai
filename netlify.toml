[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client", "ethers"]
  included_files = ["node_modules/.prisma/client/libquery_engine-*.node.abi.node", "node_modules/.prisma/client/*.node", "schema.prisma"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
