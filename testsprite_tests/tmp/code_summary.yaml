version: "2"
type: frontend
tech_stack:
  - React
  - TypeScript
  - Vite
  - TailwindCSS
  - RainbowKit
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Main dashboard and authentication portal
features:
  - name: Google Login
    description: Login using Google OAuth
    files:
      - src/App.tsx
      - src/lib/auth.tsx
    entry_route: /
    user_interactions:
      - Hover Profile button
      - Click 'Link Google Account' button
    api_calls:
      - method: GET
        endpoint: /api/auth/google
    auth_required: false
  - name: Wallet Connect
    description: Connect Web3 Wallet using RainbowKit and SIWE
    files:
      - src/App.tsx
      - src/lib/auth.tsx
    entry_route: /
    user_interactions:
      - Hover Profile button
      - Click 'Connect Wallet' button
      - Select Wallet provider
      - Sign SIWE message in Wallet popup
    api_calls:
      - method: GET
        endpoint: /api/auth/nonce
      - method: POST
        endpoint: /api/auth/verify
    auth_required: false
known_limitations: []
